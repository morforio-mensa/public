version: '3.8'

services:
  first-answer-app:
    image: node:20-alpine
    user: root
    command: sh -c "apk add --no-cache git && rm -rf /app && git clone https://github.com/morforio-mensa/public.git /app && cd /app && npm install && npm run build && npm start"
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
